name: Nightly

# Manually dispatched side-by-side "Playground Nightly" build on the alpha channel,
# published as a per-build semver pre-release with old nightlies pruned (RLCD-09/10/11).
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nightly:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Same gate as stable; a red gate blocks the build/publish (RLCD-03).
      - name: Quality gate
        run: npm run typecheck && npm run lint && npm test

      # X.Y.Z-alpha.<run#> — a semver pre-release id. The `alpha` identifier is
      # load-bearing: electron-updater derives the running app's channel from
      # semver.prerelease(version)[0], so it must equal the `alpha` publish channel
      # (→ alpha.yml). It also keeps stable's latest.yml from ever listing it (RLCD-09).
      - name: Stamp nightly version from run number
        run: npx tsx scripts/stamp-version.ts --mode=nightly

      # Bundle main/preload/renderer into out/ before packaging; electron-builder
      # only packages, it doesn't transpile (mirrors `npm run build:win`).
      - name: Build app bundle
        run: npx electron-vite build

      # Nightly identity + alpha channel give a side-by-side install (RLCD-10) and
      # emit alpha.yml (RLCD-09). bash so the -c.* overrides parse on the runner.
      #
      # extraMetadata.name overrides the packaged package.json#name, which drives
      # app.getName() and thus app.getPath('userData'). Without it, nightly keeps
      # name "playground" and shares %APPDATA% config/userData with stable (RLCD-10).
      #
      # win.icon points the nightly exe/installer at the moon-badge nightly mark so
      # the side-by-side build is visually distinct from stable in the taskbar and
      # Start menu (stable's icon comes from electron-builder.yml win.icon).
      #
      # --publish never: we build here and publish via gh below for full control over
      # the tag, target SHA, prerelease flag, and commit-stamped notes. Every nightly
      # gets its own semver tag v{version} (e.g. v0.1.0-alpha.5); old ones are pruned.
      #
      # Signing seam (RLCD-14): add CSC_LINK / CSC_KEY_PASSWORD (from secrets) as env
      # here to sign without restructuring. Unsigned builds still auto-update on Windows.
      - name: Build (nightly identity, alpha channel)
        shell: bash
        run: |
          npx electron-builder --win --publish never \
            -c.appId=com.playground.nightly \
            -c.productName="Playground Nightly" \
            -c.extraMetadata.name=playground-nightly \
            -c.win.icon=design/icons/playground-nightly.ico \
            -c.publish.channel=alpha

      # Publish on a per-build semver tag v{version}. electron-updater's GitHub
      # provider only selects releases whose tag is valid semver in the alpha/beta
      # family (it skips non-semver tags like the old fixed `nightly`), then reads
      # alpha.yml from that release. The tag carries the version; the run-number
      # bump guarantees each nightly sorts newer than the last (RLCD-09/11).
      - name: Publish nightly pre-release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          # Idempotent: a re-run keeps the same GITHUB_RUN_NUMBER (and thus the same
          # tag), so drop any existing release+tag first or `gh release create` errors.
          gh release delete "$TAG" --cleanup-tag --yes || true
          gh release create "$TAG" \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Playground Nightly $VERSION" \
            --notes "Nightly $VERSION — ${GITHUB_SHA::7} built $(date -u +%Y-%m-%dT%H:%MZ)" \
            dist/*-setup.exe dist/*-setup.exe.blockmap dist/alpha.yml

      # Prune so only the just-published nightly lingers (the rolling-single intent,
      # RLCD-11). Also retire the legacy fixed `nightly` tag from the broken scheme.
      # Never deletes the current TAG or any stable v* release (only v*-alpha.* pre-releases).
      - name: Prune old nightly pre-releases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          gh release delete nightly --cleanup-tag --yes || true
          # Filter with gh's built-in --jq (no external jq dependency) instead of
          # grep: jq exits 0 on an empty result, so the normal "nothing to prune"
          # steady state can't trip `set -e -o pipefail` the way grep's
          # exit-1-on-no-match did. The current TAG is skipped inside the loop.
          gh release list --limit 100 --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease and (.tagName | test("^v[0-9]+\\.[0-9]+\\.[0-9]+-alpha\\."))) | .tagName' \
            | while read -r old; do
                [ "$old" = "$TAG" ] && continue
                echo "Pruning old nightly $old"
                gh release delete "$old" --cleanup-tag --yes || true
              done
